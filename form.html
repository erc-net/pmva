<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PMVA Course Application Form</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100">

<div class="max-w-5xl mx-auto my-10 bg-white shadow-2xl rounded-2xl overflow-hidden">

    <!-- Header -->
    <div class="bg-[#001F54] p-8 text-center">
        <h1 class="text-4xl font-bold text-yellow-400">
            PMVA Course Application Form
        </h1>
        <p class="text-white mt-2">
            Prevention and Management of Violence and Aggression
        </p>
    </div>

    <!-- Form -->
    <form
        action="https://formsubmit.co/ericwizkid4@gmail.com"
        method="POST"
        class="p-8 space-y-6">

        <!-- Disable CAPTCHA (optional) -->
        <input type="hidden" name="_captcha" value="false">

        <!-- Redirect after submit -->
        <input type="hidden" name="_next" value="https://yourwebsite.com/thankyou.html">

        <div class="grid md:grid-cols-2 gap-6">

            <div>
                <label class="font-semibold">First Name</label>
                <input type="text" name="First Name" required
                    class="w-full border rounded-lg p-3 mt-1">
            </div>

            <div>
                <label class="font-semibold">Last Name</label>
                <input type="text" name="Last Name" required
                    class="w-full border rounded-lg p-3 mt-1">
            </div>

            <div>
                <label class="font-semibold">Email</label>
                <input type="email" name="Email" required
                    class="w-full border rounded-lg p-3 mt-1">
            </div>

            <div>
                <label class="font-semibold">Phone Number</label>
                <input type="tel" name="Phone"
                    class="w-full border rounded-lg p-3 mt-1">
            </div>

            <div>
                <label class="font-semibold">Date of Birth</label>
                <input type="date" name="Date of Birth"
                    class="w-full border rounded-lg p-3 mt-1">
            </div>

            <div>
                <label class="font-semibold">Occupation</label>
                <input type="text" name="Occupation"
                    class="w-full border rounded-lg p-3 mt-1">
            </div>

        </div>

        <div>
            <label class="font-semibold">Employer / Organisation</label>
            <input type="text" name="Employer"
                class="w-full border rounded-lg p-3 mt-1">
        </div>

        <div>
            <label class="font-semibold">Course Applying For</label>
            <select name="Course" class="w-full border rounded-lg p-3 mt-1">
                <option>PMVA 1-Day Refresher</option>
                <option>PMVA 2-Day Course</option>
                <option>PMVA 3-Day Full Course</option>
            </select>
        </div>

        <div>
            <label class="font-semibold">Home Address</label>
            <textarea
                name="Address"
                rows="3"
                class="w-full border rounded-lg p-3 mt-1"></textarea>
        </div>

        <div>
            <label class="font-semibold">Emergency Contact Name</label>
            <input type="text"
                name="Emergency Contact"
                class="w-full border rounded-lg p-3 mt-1">
        </div>

        <div>
            <label class="font-semibold">Emergency Contact Phone</label>
            <input type="tel"
                name="Emergency Phone"
                class="w-full border rounded-lg p-3 mt-1">
        </div>

        <div>
            <label class="font-semibold">
                Medical Conditions / Accessibility Requirements
            </label>

            <textarea
                name="Medical Information"
                rows="4"
                class="w-full border rounded-lg p-3 mt-1"></textarea>
        </div>

        <div>
            <label class="font-semibold">
                Additional Notes
            </label>

            <textarea
                name="Additional Notes"
                rows="4"
                class="w-full border rounded-lg p-3 mt-1"></textarea>
        </div>

        <div class="flex items-start gap-3">
            <input type="checkbox" required class="mt-1">
            <span>
                I confirm that the information provided is accurate and I agree
                to the terms and conditions of the PMVA training programme.
            </span>
        </div>

        <button
            type="submit"
            class="w-full bg-yellow-400 hover:bg-yellow-500 text-[#001F54] font-bold py-4 rounded-lg transition duration-300">
            Submit Application
        </button>

    </form>

</div>

</body>
</html>
